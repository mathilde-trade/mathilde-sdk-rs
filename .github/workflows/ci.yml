name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  sdk:
    name: sdk checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test --lib --tests
